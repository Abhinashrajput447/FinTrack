<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack — Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body data-page="reports">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="assets/logo.svg" alt="FinTrack" class="brand-logo">
            <span>FinTrack</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a></li>
            <li><a href="add-expense.html" class="nav-link"><i class="bi bi-plus-circle-fill"></i><span>Add Transaction</span></a></li>
            <li><a href="history.html" class="nav-link"><i class="bi bi-clock-history"></i><span>History</span></a></li>
            <li><a href="reports.html" class="nav-link active"><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a></li>
            <li><a href="budget.html" class="nav-link"><i class="bi bi-piggy-bank-fill"></i><span>Budget</span></a></li>
            <li><a href="export.html" class="nav-link"><i class="bi bi-download"></i><span>Export</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="sidebar-footer-row">
                <button class="btn-currency" id="currencyBtn" title="Change currency">
                    <i class="bi bi-search"></i>
                    <span id="currencyBtnLabel">₹ INR</span>
                </button>
                <button class="btn-theme" id="themeToggle" title="Toggle theme">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
            </div>
            <div class="currency-popup" id="currencyPopup">
                <div class="currency-popup-search">
                    <i class="bi bi-search"></i>
                    <input type="text" id="currencySearchInput" placeholder="Search currency..." autocomplete="off">
                </div>
                <ul class="currency-list" id="currencyList"></ul>
            </div>
        </div>
    </nav>

    <!-- Mobile Top Bar -->
    <div class="mobile-topbar d-md-none">
        <button class="btn-menu" id="menuToggle"><i class="bi bi-list"></i></button>
        <span class="brand-text"><img src="assets/logo.svg" alt="FinTrack" class="brand-logo-sm"> FinTrack</span>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <section id="reports" class="content-section active">
            <div class="section-header">
                <div class="reports-header-group">
                    <h2>Reports</h2>
                    <p class="reports-period" id="reportsPeriod">Period: —</p>
                </div>
            </div>
            <div class="charts-row">
                <div class="chart-card full-width">
                    <div class="chart-header">
                        <h5>Monthly Income vs Expenses</h5>
                        <div class="chart-legend">
                            <span class="legend-item"><span class="legend-color" style="background: rgba(16, 185, 129, 0.7);"></span> Income</span>
                            <span class="legend-item"><span class="legend-color" style="background: rgba(239, 68, 68, 0.7);"></span> Expense</span>
                        </div>
                    </div>
                    <canvas id="monthlyCompareChart"></canvas>
                </div>
            </div>
            <div class="charts-row">
                <div class="chart-card">
                    <h5>Top Expense Categories</h5>
                    <canvas id="topCategoriesChart"></canvas>
                </div>
                <div class="chart-card">
                    <h5>Daily Spending Trend</h5>
                    <canvas id="dailyTrendChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/storage.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
