<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#c7d2fe"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4338ca" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle inner glow ring -->
  <rect x="56" y="56" width="400" height="400" rx="80" ry="80" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- Rising bar chart (3 bars) -->
  <rect x="128" y="310" width="52" height="90" rx="10" fill="url(#barGrad)" opacity="0.85"/>
  <rect x="210" y="250" width="52" height="150" rx="10" fill="url(#barGrad)" opacity="0.9"/>
  <rect x="292" y="190" width="52" height="210" rx="10" fill="url(#barGrad)"/>

  <!-- Upward trend arrow -->
  <polyline points="148,340 236,275 318,215 380,155" fill="none" stroke="url(#arrowGrad)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead -->
  <polygon points="380,155 380,200 345,170" fill="#10b981"/>

  <!-- Small coin / rupee circle at top-right -->
  <circle cx="380" cy="145" r="30" fill="rgba(255,255,255,0.2)" stroke="#fff" stroke-width="3"/>
  <text x="380" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="bold" fill="#fff">₹</text>
</svg>
