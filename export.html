<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack — Export Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.2/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js"></script>
    <link rel="icon" type="image/svg+xml" href="assets/logo.svg">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body data-page="export">

    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <img src="assets/logo.svg" alt="FinTrack" class="brand-logo">
            <span>FinTrack</span>
        </div>
        <ul class="sidebar-nav">
            <li><a href="index.html" class="nav-link"><i class="bi bi-grid-1x2-fill"></i><span>Dashboard</span></a></li>
            <li><a href="add-expense.html" class="nav-link"><i class="bi bi-plus-circle-fill"></i><span>Add Transaction</span></a></li>
            <li><a href="history.html" class="nav-link"><i class="bi bi-clock-history"></i><span>History</span></a></li>
            <li><a href="reports.html" class="nav-link"><i class="bi bi-bar-chart-line-fill"></i><span>Reports</span></a></li>
            <li><a href="budget.html" class="nav-link"><i class="bi bi-piggy-bank-fill"></i><span>Budget</span></a></li>
            <li><a href="export.html" class="nav-link active"><i class="bi bi-download"></i><span>Export</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="sidebar-footer-row">
                <button class="btn-currency" id="currencyBtn" title="Change currency">
                    <i class="bi bi-search"></i>
                    <span id="currencyBtnLabel">₹ INR</span>
                </button>
                <button class="btn-theme" id="themeToggle" title="Toggle theme">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
            </div>
            <div class="currency-popup" id="currencyPopup">
                <div class="currency-popup-search">
                    <i class="bi bi-search"></i>
                    <input type="text" id="currencySearchInput" placeholder="Search currency..." autocomplete="off">
                </div>
                <ul class="currency-list" id="currencyList"></ul>
            </div>
        </div>
    </nav>

    <!-- Mobile Top Bar -->
    <div class="mobile-topbar d-md-none">
        <button class="btn-menu" id="menuToggle"><i class="bi bi-list"></i></button>
        <span class="brand-text"><img src="assets/logo.svg" alt="FinTrack" class="brand-logo-sm"> FinTrack</span>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <section id="export" class="content-section active">
            <div class="section-header">
                <h2>Export Report</h2>
            </div>
            <div class="panel export-panel">
                <div class="export-filters">
                    <div class="form-group">
                        <label for="exportMonth">Month</label>
                        <input type="month" id="exportMonth" class="form-input">
                    </div>
                    <div class="form-group">
                        <label for="exportType">Type</label>
                        <select id="exportType" class="form-input">
                            <option value="all">All</option>
                            <option value="expense">Expense</option>
                            <option value="income">Income</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="exportCategory">Category</label>
                        <select id="exportCategory" class="form-input">
                            <option value="all">All Categories</option>
                        </select>
                    </div>
                </div>
                <div class="export-summary">
                    <div class="export-stat income"><span class="stat-label">Income</span><span class="stat-value" id="exportIncome">₹0</span></div>
                    <div class="export-stat expense"><span class="stat-label">Expenses</span><span class="stat-value" id="exportExpense">₹0</span></div>
                    <div class="export-stat balance"><span class="stat-label">Balance</span><span class="stat-value" id="exportBalance">₹0</span></div>
                </div>
                <div class="export-preview">
                    <div class="preview-header">
                        <span id="exportCount">0 transactions</span>
                        <div class="export-btns">
                            <button class="btn-export csv" id="btnExportCSV" disabled><i class="bi bi-filetype-csv"></i> CSV</button>
                            <button class="btn-export pdf" id="btnExportPDF" disabled><i class="bi bi-filetype-pdf"></i> PDF</button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="export-table">
                            <thead>
                                <tr><th>Date</th><th>Type</th><th>Category</th><th>Note</th><th>Amount</th></tr>
                            </thead>
                            <tbody id="exportTableBody">
                                <tr><td colspan="5" class="empty-state">No transactions found for selected filters.</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="js/storage.js"></script>
    <script src="js/expense.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/export.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
